<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Loop of the Recursive Dragon</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <!-- Persistent toolbar: sits outside game-root so it survives screen changes -->
    <div class="game-toolbar" role="toolbar" aria-label="Game controls">
      <button id="back-btn" class="toolbar-btn toolbar-btn--back" hidden
              aria-label="Save and return to main menu">← Menu</button>
      <button id="sound-toggle" class="toolbar-btn"
              aria-pressed="true"
              aria-label="Sound effects: on. Click to toggle.">🔊</button>
    </div>

    <div id="game-root" role="main" aria-live="polite" aria-atomic="false"></div>
  </div>

  <!-- ── Main menu ───────────────────────────────────────────────── -->
  <template id="tpl-main-menu">
    <div class="bbs-container" role="banner">
      <h1 class="title">Loop of the Recursive Dragon</h1>
      <div class="section" style="text-align:center;margin-top:4px">
        Battle monsters. Master computer science.
      </div>
      <details class="how-to-play">
        <summary class="how-to-play-toggle">How to play ▾</summary>
        <div class="how-to-play-body">
          <p>Each encounter presents a question about computer science. Select <em>all</em> correct answers, then submit.</p>
          <p>Right answers deal damage to the monster; wrong answers or missed answers let the monster hit you back. Defeat enough monsters to level up and unlock better gear!</p>
          <p>Keys: <span class="yellow">1–9</span> toggle answer options &nbsp;·&nbsp; <span class="yellow">Enter</span> submits</p>
        </div>
      </details>
    </div>

    <!-- Global stats bar (hidden when no data) -->
    <div class="bbs-container stats-bar" data-ref="globalStats" hidden
         aria-label="Your global statistics"></div>

    <!-- Continue / in-progress (hidden when nothing in progress) -->
    <div class="bbs-container in-progress-section" data-ref="inProgressSection" hidden
         role="region" aria-label="Continue in-progress sets">
      <div class="topic-heading">▶ CONTINUE</div>
      <div data-ref="inProgressList"></div>
    </div>

    <!-- Topic sections injected by JS -->
    <div data-ref="topicSections"></div>
  </template>

  <!-- ── Initial welcome screen ─────────────────────────────────── -->
  <template id="tpl-initial">
    <div class="bbs-container">
      <h1 class="title">Welcome to the Loop of the Recursive Dragon!</h1>
      <div class="section">
        In this game, you'll battle monsters to master ideas about computer science, databases,
        cybersecurity, tech ethics, and more. Right answers hurt monsters; wrong answers hurt you.
        Good luck!
        <p>A game by Brendan Shea, PhD (<a href="mailto:Brendan.Shea@rctc.edu" style="color:inherit">Brendan.Shea@rctc.edu</a>)</p>
      </div>
      <div class="button-container">
        <button class="action-button" data-action="start"
                aria-label="Begin the adventure">Start Adventure</button>
      </div>
    </div>
  </template>

  <!-- ── Question set selection ──────────────────────────────────── -->
  <template id="tpl-set-select">
    <div class="bbs-container">
      <h1 class="title">Choose Your Question Set</h1>
      <div class="section">Select a question set to begin your adventure.</div>
      <label for="set-select-input" class="sr-only">Question set</label>
      <select id="set-select-input" class="question-set-select" data-ref="setSelect"
              aria-label="Choose a question set"></select>
      <div class="button-container">
        <button class="action-button" data-action="load"
                aria-label="Load the selected question set">Load Questions</button>
      </div>
    </div>
  </template>

  <!-- ── Resume saved game prompt ───────────────────────────────── -->
  <template id="tpl-resume">
    <div class="bbs-container">
      <h1 class="title">Saved Game Found</h1>
      <div class="section" data-ref="resumeInfo"></div>
      <div class="button-container">
        <button class="action-button" data-action="resume"
                aria-label="Resume saved game">Resume Game</button>
        <button class="action-button action-button--secondary" data-action="new-game"
                aria-label="Discard save and start a new game">New Game</button>
      </div>
    </div>
  </template>

  <!-- ── Encounter screen ───────────────────────────────────────── -->
  <template id="tpl-encounter">
    <div class="bbs-container" role="region" aria-label="Monster encounter">
      <div class="encounter-breadcrumb" data-ref="breadcrumb"></div>
      <div class="streak-display" data-ref="streak" hidden aria-live="polite"></div>
      <div class="monster-layout">
        <div class="monster-image-container" data-ref="imgWrap" hidden>
          <img class="monster-image" data-ref="img" alt="">
        </div>
        <div class="monster-details">
          <div class="monster-name-line">
            <span class="bold underline" data-ref="mName"></span><span data-ref="mDesc"></span>
          </div>
          <div class="monster-hp-block">
            HP: <span class="yellow" data-ref="mHP"></span>
            <span class="monster-hp-bar-wrap" aria-hidden="true"><span class="monster-hp-bar" data-ref="mHPBar"></span></span>
          </div>
          <div class="player-hud" aria-label="Player stats">
            <span class="hud-item"><span aria-hidden="true">❤</span><span class="sr-only">HP:</span> <span data-ref="pHP"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">⭐</span><span class="sr-only">Level</span> Lvl <span data-ref="pLvl"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">✦</span><span class="sr-only">XP:</span> <span data-ref="pXP"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">⚔</span><span class="sr-only">Weapon:</span> <span data-ref="pWeap"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">🛡</span><span class="sr-only">Armor:</span> <span data-ref="pArmor"></span></span>
            <span class="hud-sep" aria-hidden="true" data-ref="itemSep" hidden>·</span>
            <span class="hud-item hud-item--active" data-ref="itemSlot" hidden></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Journey progress ──────────────────────────────────────── -->
    <div class="bbs-container progress-section" data-ref="progressSection"
         role="region" aria-label="Journey progress">
      <div class="prog-header">
        <span class="prog-label">⚔ JOURNEY</span>
        <span class="prog-stats" data-ref="progStats"></span>
      </div>
      <div class="prog-corridor" aria-hidden="true">
        <div class="prog-blocks" data-ref="progBar"></div>
        <span class="prog-dragon">🐉</span>
      </div>
      <div class="retry-row" data-ref="retryRow" hidden aria-live="polite">
        <span class="retry-label">↺ Retry:</span>
        <div class="prog-blocks prog-blocks--sm" data-ref="retryBar"></div>
        <span class="retry-text" data-ref="retryText"></span>
      </div>
    </div>

    <div class="bbs-container" role="region" aria-label="Question and answers">
      <div class="section">
        <span class="bold">Question:</span>
        <span data-ref="qText"></span>
      </div>

      <!-- role and aria-labelledby are set in JS after the option label id is assigned -->
      <div class="checkbox-container" data-ref="options"></div>

      <div class="kb-hint" data-ref="kbHint" aria-hidden="true"></div>

      <div class="button-container">
        <button class="action-button submit-btn" data-action="submit"
                aria-label="Submit your selected answers">Submit Answer</button>
      </div>
    </div>
  </template>

  <!-- ── Fill-in-the-blank encounter ───────────────────────────── -->
  <template id="tpl-encounter-fill-blank">
    <div class="bbs-container" role="region" aria-label="Monster encounter">
      <div class="encounter-breadcrumb" data-ref="breadcrumb"></div>
      <div class="streak-display" data-ref="streak" hidden aria-live="polite"></div>
      <div class="monster-layout">
        <div class="monster-image-container" data-ref="imgWrap" hidden>
          <img class="monster-image" data-ref="img" alt="">
        </div>
        <div class="monster-details">
          <div class="monster-name-line">
            <span class="bold underline" data-ref="mName"></span><span data-ref="mDesc"></span>
          </div>
          <div class="monster-hp-block">
            HP: <span class="yellow" data-ref="mHP"></span>
            <span class="monster-hp-bar-wrap" aria-hidden="true"><span class="monster-hp-bar" data-ref="mHPBar"></span></span>
          </div>
          <div class="player-hud" aria-label="Player stats">
            <span class="hud-item"><span aria-hidden="true">❤</span><span class="sr-only">HP:</span> <span data-ref="pHP"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">⭐</span><span class="sr-only">Level</span> Lvl <span data-ref="pLvl"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">✦</span><span class="sr-only">XP:</span> <span data-ref="pXP"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">⚔</span><span class="sr-only">Weapon:</span> <span data-ref="pWeap"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">🛡</span><span class="sr-only">Armor:</span> <span data-ref="pArmor"></span></span>
            <span class="hud-sep" aria-hidden="true" data-ref="itemSep" hidden>·</span>
            <span class="hud-item hud-item--active" data-ref="itemSlot" hidden></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Journey progress ──────────────────────────────────────── -->
    <div class="bbs-container progress-section" data-ref="progressSection"
         role="region" aria-label="Journey progress">
      <div class="prog-header">
        <span class="prog-label">⚔ JOURNEY</span>
        <span class="prog-stats" data-ref="progStats"></span>
      </div>
      <div class="prog-corridor" aria-hidden="true">
        <div class="prog-blocks" data-ref="progBar"></div>
        <span class="prog-dragon">🐉</span>
      </div>
      <div class="retry-row" data-ref="retryRow" hidden aria-live="polite">
        <span class="retry-label">↺ Retry:</span>
        <div class="prog-blocks prog-blocks--sm" data-ref="retryBar"></div>
        <span class="retry-text" data-ref="retryText"></span>
      </div>
    </div>

    <div class="bbs-container" role="region" aria-label="Fill in the blank">
      <div class="section">
        <span class="bold">Fill in the blank:</span>
        <span data-ref="qText"></span>
      </div>
      <div class="char-hint" data-ref="charHint" aria-label="Character count hint"></div>
      <div class="fill-blank-input-row">
        <label for="fill-blank-input" class="sr-only">Your answer</label>
        <input id="fill-blank-input" type="text" class="fill-blank-input"
               data-ref="answerInput"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               aria-label="Type your answer here" placeholder="Type your answer…">
      </div>
      <div class="button-container">
        <button class="action-button submit-btn" data-action="submit"
                aria-label="Submit your answer">Submit Answer</button>
      </div>
    </div>
  </template>

  <!-- ── Matching encounter ─────────────────────────────────────── -->
  <template id="tpl-encounter-matching">
    <div class="bbs-container" role="region" aria-label="Monster encounter">
      <div class="encounter-breadcrumb" data-ref="breadcrumb"></div>
      <div class="streak-display" data-ref="streak" hidden aria-live="polite"></div>
      <div class="monster-layout">
        <div class="monster-image-container" data-ref="imgWrap" hidden>
          <img class="monster-image" data-ref="img" alt="">
        </div>
        <div class="monster-details">
          <div class="monster-name-line">
            <span class="bold underline" data-ref="mName"></span><span data-ref="mDesc"></span>
          </div>
          <div class="monster-hp-block">
            HP: <span class="yellow" data-ref="mHP"></span>
            <span class="monster-hp-bar-wrap" aria-hidden="true"><span class="monster-hp-bar" data-ref="mHPBar"></span></span>
          </div>
          <div class="player-hud" aria-label="Player stats">
            <span class="hud-item"><span aria-hidden="true">❤</span><span class="sr-only">HP:</span> <span data-ref="pHP"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">⭐</span><span class="sr-only">Level</span> Lvl <span data-ref="pLvl"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">✦</span><span class="sr-only">XP:</span> <span data-ref="pXP"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">⚔</span><span class="sr-only">Weapon:</span> <span data-ref="pWeap"></span></span>
            <span class="hud-sep" aria-hidden="true">·</span>
            <span class="hud-item"><span aria-hidden="true">🛡</span><span class="sr-only">Armor:</span> <span data-ref="pArmor"></span></span>
            <span class="hud-sep" aria-hidden="true" data-ref="itemSep" hidden>·</span>
            <span class="hud-item hud-item--active" data-ref="itemSlot" hidden></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Journey progress ──────────────────────────────────────── -->
    <div class="bbs-container progress-section" data-ref="progressSection"
         role="region" aria-label="Journey progress">
      <div class="prog-header">
        <span class="prog-label">⚔ JOURNEY</span>
        <span class="prog-stats" data-ref="progStats"></span>
      </div>
      <div class="prog-corridor" aria-hidden="true">
        <div class="prog-blocks" data-ref="progBar"></div>
        <span class="prog-dragon">🐉</span>
      </div>
      <div class="retry-row" data-ref="retryRow" hidden aria-live="polite">
        <span class="retry-label">↺ Retry:</span>
        <div class="prog-blocks prog-blocks--sm" data-ref="retryBar"></div>
        <span class="retry-text" data-ref="retryText"></span>
      </div>
    </div>

    <div class="bbs-container" role="region" aria-label="Matching question">
      <div class="section">
        <span class="bold">Match each term to its definition:</span>
        <span data-ref="qText"></span>
      </div>
      <div class="match-table" data-ref="matchTable" role="group"
           aria-label="Matching pairs"></div>
      <div class="button-container">
        <button class="action-button submit-btn" data-action="submit"
                aria-label="Submit your matches">Submit Matches</button>
      </div>
    </div>
  </template>

  <!-- ── Results screen ────────────────────────────────────────── -->
  <template id="tpl-results">
    <div class="bbs-container battle-text" role="region" aria-label="Round results">
      <div class="section" data-ref="resultsBody"></div>
    </div>
    <div class="button-container">
      <button class="action-button" data-action="continue"
              aria-label="Continue to next encounter">Continue</button>
    </div>
  </template>

  <!-- ── Level up ───────────────────────────────────────────────── -->
  <template id="tpl-levelup">
    <div class="bbs-container level-up-container" role="region" aria-label="Level up">
      <div class="level-up-title" aria-live="assertive">🎉 Congratulations!</div>
      <div class="section">
        <span class="bold">You've reached level <span data-ref="level"></span>!</span><br>
        <span data-ref="levelsGainedText"></span>
      </div>
      <div class="section new-gear">
        <span class="bold">New Gear Unlocked:</span><br>
        <span class="bold">Weapon:</span> <span data-ref="weaponName"></span>
        (<span data-ref="weaponDie"></span>)<br>
        <span class="bold">Armor:</span> <span data-ref="armorName"></span>
        (Defense: <span data-ref="armorDef"></span>)<br>
      </div>
      <div class="section hit-points">
        <span class="bold">Hit Points Increased:</span>
        Your maximum HP is now <span class="yellow" data-ref="maxHP"></span>!
      </div>
    </div>
    <div class="button-container">
      <button class="action-button" data-action="continue"
              aria-label="Continue adventure after leveling up">Continue Adventure</button>
    </div>
  </template>

  <!-- ── Victory ────────────────────────────────────────────────── -->
  <template id="tpl-victory">
    <div class="bbs-container" role="region" aria-label="Victory">
      <h1 class="title">Victory!</h1>
      <div class="section" data-ref="victoryStats" aria-live="assertive"></div>
    </div>
    <div class="button-container">
      <button class="action-button" data-action="review"
              aria-label="View session review and export results">Session Review</button>
    </div>
  </template>

  <!-- ── No questions remaining ─────────────────────────────────── -->
  <template id="tpl-no-questions">
    <div class="bbs-container" role="region" aria-label="Session complete">
      <div class="section">
        <span class="bold red">All questions have been answered!</span> The monster flees.
      </div>
      <div class="section" data-ref="finalStats"></div>
    </div>
    <div class="button-container">
      <button class="action-button" data-action="review"
              aria-label="View session review and export results">Session Review</button>
    </div>
  </template>

  <!-- ── Game over ──────────────────────────────────────────────── -->
  <template id="tpl-gameover">
    <div class="bbs-container" role="region" aria-label="Game over">
      <h1 class="title">Game Over</h1>
      <div class="section" data-ref="gameOverStats" aria-live="assertive"></div>
    </div>
    <div class="button-container">
      <button class="action-button" data-action="restart"
              aria-label="Restart the same question set from the beginning">Restart Same Set</button>
      <button class="action-button action-button--secondary" data-action="review"
              aria-label="View session review and export results">Session Review</button>
    </div>
  </template>

  <!-- ── Session review ─────────────────────────────────────────── -->
  <template id="tpl-review">
    <div class="bbs-container">
      <h1 class="title" data-ref="reviewTitle"></h1>
      <div class="section review-summary" data-ref="reviewSummary"></div>
    </div>
    <div class="bbs-container review-list-container">
      <div class="review-list" data-ref="reviewList" role="list"
           aria-label="Question-by-question results"></div>
    </div>
    <div class="button-container">
      <button class="action-button action-button--export" data-action="export"
              aria-label="Export session results to a text file">Export to Text File</button>
      <button class="action-button action-button--secondary" data-action="main-menu"
              aria-label="Return to main menu">Main Menu</button>
    </div>
  </template>

  <!-- ── Hint (appended inline, not full-screen) ────────────────── -->
  <template id="tpl-hint">
    <div class="bbs-container hint" role="alert">
      <div class="section">
        <span class="cyan">Hint: <span data-ref="hintText"></span></span>
      </div>
    </div>
  </template>

  <script type="module" src="src/main.js"></script>
</body>
</html>
